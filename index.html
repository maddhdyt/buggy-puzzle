<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="src/style.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link
      href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet">
   <title>Buggy Puzzle</title>
</head>

<body>
   <div class="container">
      <div class="title">
         <div class="figure">
            <img src="assets/img/buggy-icon.jpg" alt="">
         </div>
         <div class="text">
            <h1>Buggy Puzzle</h1>
            <p>Arrange the buggy to make sense</p>
         </div>

      </div>
      <div class="grid-container">
         <div class="items">
            <img class="right-foot" src="assets/img/right-foot.png" alt="right foot">
         </div>
         <div class="items">
            <span class="no-image"></span>
         </div>
         <div class="items">
            <img class="left-arm" src="assets/img/left-arm.png" alt="left arm">
         </div>
         <div class="items">
            <span class="no-image"></span>
         </div>
         <div class="items">
            <img class="left-leg" src="assets/img/left-leg.png" alt="left leg">
         </div>
         <div class="items">
            <img class="right-leg" src="assets/img/right-leg.png" alt="right leg">
         </div>
         <div class="items">
            <img class="right-arm" src="assets/img/right-arm.png" alt="right arm">
         </div>
         <div class="items">
            <span class="no-image"></span>
         </div>
         <div class="items">
            <img class="head-chest" src="assets/img/head-chest.png" alt="head chest">
         </div>
         <div class="items">
            <img class="body" src="assets/img/body.png" alt="body">
         </div>
      </div>
   </div>
</body>

</html>
